spring.config.import=optional:file:.env[.properties]

spring.application.name=backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Admin Credentials (Spring Security Defaults)
spring.security.user.name=${ADMIN_USER}
spring.security.user.password=${ADMIN_PASS}
spring.security.user.roles=ADMIN

# Brevo REST API Configuration
BREVO_API_KEY=${BREVO_API_KEY}

# Configurable Notification Retention Period (in days)
notification.retention.days=30

# Configurable Frontend Client URL for reset password links
app.client.url=${APP_CLIENT_URL:http://timesheet.idealfolks.com}

# OTP Verification & Limits
otp.expiry.minutes=15
otp.max.attempts=5
otp.max.resends=3
